services:
  postgres:
    image: postgres:16-alpine
    container_name: hde_postgres
    environment:
      POSTGRES_DB: hybrid_diagram_editor
      POSTGRES_USER: hde_user
      POSTGRES_PASSWORD: hde_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hde_user -d hybrid_diagram_editor"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hde_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://hde_user:hde_password@postgres:5432/hybrid_diagram_editor
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hde_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
